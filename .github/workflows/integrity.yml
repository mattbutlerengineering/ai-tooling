name: integrity

# Enforces the catalog integrity apparatus on every push and PR. The detectors
# already exist (audit-evals.py A/B/D/G + reconcile-counts.py --check); this is the
# server-side, can't-be-skipped backstop. Complements the local hooks in #39.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      # detector A's install resolver shells out to `gh api` for owner/repo slugs;
      # GITHUB_TOKEN authenticates it so it isn't rate-limited.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Fast, deterministic, no network — fails the PR early on the common drift.
      - name: Offline gates (fabrication / verdict / comparison)
        run: python3 audit-evals.py --offline

      - name: Classifier + eval-parser selftest
        run: python3 audit-evals.py --selftest

      - name: Count consistency (reconcile --check)
        run: python3 reconcile-counts.py --check

      # Every eval must declare an Evidence field and COMPARISON's Evidence column
      # must match the evals; fails the PR if an eval was added without re-running
      # ./backfill-evidence.py.
      - name: Evidence field + column in sync (backfill-evidence.py --check)
        run: python3 backfill-evidence.py --check

      # STACK.md's evidence tiers are derived from the Evidence data; fails the PR if
      # the tier block is stale (a tool's Evidence changed without re-running tier-stack).
      - name: STACK evidence tiers in sync (tier-stack.py --check)
        run: python3 tier-stack.py --check

      # plugin/docs/ is a synced copy of the root docs; this fails the PR if a doc
      # change was committed without re-running ./sync-plugin-docs.sh.
      - name: Plugin docs in sync (sync-plugin-docs.sh --check)
        run: ./sync-plugin-docs.sh --check

      # Network: resolves every install command against npm / PyPI / crates / GitHub.
      # Node and gh are preinstalled on ubuntu-latest.
      - name: Install resolver
        run: python3 audit-evals.py --installs
