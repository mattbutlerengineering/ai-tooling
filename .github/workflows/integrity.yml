name: integrity

# Enforces the catalog integrity apparatus on every push and PR. The detectors
# already exist (audit-evals.py A/B/D/G + reconcile-counts.py --check); this is the
# server-side, can't-be-skipped backstop. Complements the local hooks in #39.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      # detector A's install resolver shells out to `gh api` for owner/repo slugs;
      # GITHUB_TOKEN authenticates it so it isn't rate-limited.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Single entrypoint (#114): `make check` runs the full gate set in --check mode
      # — offline gates (B/D/G/J/K/O), the selftest, reconcile/backfill/tier/sync --check,
      # and the network install resolver (A) — exiting non-zero on the first failure.
      # Defined in ./Makefile so the local and CI gate sets cannot drift; Node and gh
      # are preinstalled on ubuntu-latest and GH_TOKEN above authenticates the resolver.
      - name: Integrity gates (make check)
        run: make check
